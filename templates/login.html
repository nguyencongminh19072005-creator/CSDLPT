<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — QLDT Phân tán</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <h1>QLDT Phân tán</h1>
            <p class="sub">Hệ thống Đăng ký Học phần — Trung tâm Hà Đông</p>
            <div id="login-error" class="alert alert-error hidden"></div>
            <div class="form-group">
                <label>Tên đăng nhập</label>
                <input type="text" id="username" placeholder="Mã SV / Mã GV / admin" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Mật khẩu <span id="pw-hint" style="font-weight:400;color:#999">(chỉ cần cho admin)</span></label>
                <input type="password" id="password" placeholder="••••••" autocomplete="current-password">
            </div>
            <button class="btn btn-primary" style="width:100%;margin-top:0.5rem;" onclick="doLogin()">
                <span id="btn-text">Đăng nhập</span>
                <span id="btn-loader" class="loader hidden"></span>
            </button>
            <div style="margin-top:1.2rem;font-size:0.8rem;color:#666;text-align:center;">
                <strong>Sinh viên / Giảng viên:</strong> nhập mã của bạn (không cần mật khẩu)<br>
                <strong>Admin:</strong> admin / admin123
            </div>
        </div>
    </div>
    <script>
        const API = '/api';
        document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('login-error');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const btn = document.querySelector('.login-box .btn');
            errEl.classList.add('hidden');
            if (!username) {
                errEl.textContent = 'Vui lòng nhập tên đăng nhập.';
                errEl.classList.remove('hidden');
                return;
            }
            btn.disabled = true;
            btnText.textContent = 'Đang đăng nhập...';
            btnLoader.classList.remove('hidden');
            try {
                const resp = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await resp.json();
                if (data.success) {
                    sessionStorage.setItem('csdlpt_user', JSON.stringify({
                        username,
                        role: data.role,
                        ten: data.ten,
                        ma_sv: data.role === 'sinhvien' ? username : null,
                        ma_gv: data.role === 'giangvien' ? username : null,
                    }));
                    window.location.href = '/trang-chu';
                } else {
                    errEl.textContent = data.message;
                    errEl.classList.remove('hidden');
                }
            } catch (e) {
                errEl.textContent = 'Lỗi kết nối server.';
                errEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Đăng nhập';
                btnLoader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
